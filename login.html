<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ZabbIAx - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="js/auth.js"></script>
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg" style="width: 400px;">
  <div class="card-body">
    <h4 class="text-center mb-4">ZabbIAx Login</h4>

    <div class="mb-3">
      <input type="text" id="username" class="form-control" placeholder="Usuario">
    </div>

    <div class="mb-3">
      <input type="password" id="password" class="form-control" placeholder="Contraseña">
    </div>

    <button id="loginBtn" class="btn btn-primary w-100">Iniciar Sesión</button>

    <div id="errorMsg" class="text-danger mt-3 text-center"></div>
  </div>
</div>

</body>
</html>
