<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Zabbix</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="d-flex justify-content-center align-items-center vh-100" x-data="loginApp()">

<div class="card p-4" style="width: 300px;">
  <h5 class="card-title mb-3">Login Zabbix</h5>
  <input type="text" class="form-control mb-2" placeholder="Usuario" x-model="user">
  <input type="password" class="form-control mb-3" placeholder="Contraseña" x-model="password">
  <button class="btn btn-primary w-100" @click="login()">Ingresar</button>
  <div class="mt-2 text-danger" x-text="loginError"></div>
</div>

<script>
function loginApp() {
  return {
    user: '',
    password: '',
    loginError: '',

    login() {
      this.loginError = '';
      if(!this.user || !this.password) { this.loginError="Completa usuario y contraseña"; return; }

      const payload = {
        jsonrpc: "2.0",
        method: "user.login",
        params: {
          username: this.user,
          password: this.password
        },
        id: 1
      };

      axios.post('http://10.161.115.127/zabbix/api_jsonrpc.php', payload)
        .then(res => {
          if(res.data.result) {
            // Redirigir a dashboard con token en URL
            const token = res.data.result;
            window.location.href = 'index.html?token=' + encodeURIComponent(token);
          } else {
            this.loginError = "Usuario o contraseña incorrecta";
          }
        })
        .catch(err => {
          this.loginError = "Error conexión API: " + err.message;
        });
    }
  }
}
</script>
</body>
</html>
