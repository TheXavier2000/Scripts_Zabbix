<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ZabbIAx Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module" src="js/dashboard.js"></script>
</head>

<body class="bg-light">

<div class="container-fluid">
  <div class="row vh-100">

    <!-- IZQUIERDA -->
    <div class="col-2 bg-dark text-white p-3">
      <h5>Operaciones</h5>
      <button class="btn btn-outline-light w-100 mb-2" data-op="icmp">ICMP</button>
      <button class="btn btn-outline-light w-100 mb-2" data-op="snmpv2">SNMPv2</button>
      <button class="btn btn-outline-light w-100 mb-2" data-op="snmpv3">SNMPv3</button>
      <hr>
      <button id="logoutBtn" class="btn btn-danger w-100">Salir</button>
    </div>

    <!-- CENTRO -->
    <div class="col-6 p-3">
      <h5>Configuración</h5>

  <!-- GRUPOS -->
    <div class="mb-4">
      <label class="form-label">Buscar Grupo</label>
      <input type="text" id="groupSearch" class="form-control mb-2" placeholder="Escribe para buscar grupo...">

      <div id="groupList" class="list-group" style="max-height:200px; overflow:auto;"></div>
    </div>

    <!-- TEMPLATES -->
    <div class="mb-4">
      <label class="form-label">Buscar Template</label>
      <input type="text" id="templateSearch" class="form-control mb-2" placeholder="Escribe para buscar template...">

      <div id="templateList" class="list-group" style="max-height:200px; overflow:auto;"></div>
    </div>

      <button id="executeBtn" class="btn btn-primary w-100">Ejecutar</button>
      
      <h6>Logs</h6>
      <div id="logContainer" class="bg-black text-white p-2 rounded" style="height:250px; overflow:auto;"></div>
    </div>

    <!-- DERECHA -->
    <div class="col-4 p-3 bg-white border-start">
      <h5>Hosts</h5>

      <input type="text" id="manualHost" class="form-control mb-2" placeholder="Hostname">
      <input type="text" id="manualIP" class="form-control mb-2" placeholder="IP">
      <button id="addManualBtn" class="btn btn-success w-100 mb-3">Agregar</button>

      <input type="file" id="fileInput" class="form-control mb-3">

      <table class="table table-sm table-bordered">
        <thead>
          <tr>
            <th>Hostname</th>
            <th>IP</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="hostTable"></tbody>
      </table>

     
    </div>

  </div>
</div>

</body>
</html>
